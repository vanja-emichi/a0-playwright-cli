<html>
<head><title>Playwright CLI</title></head>
<body>
  <div>
    <template x-if="true">
      <div>
        <div class="section">
          <div class="section-title">Playwright CLI Plugin</div>
          <div class="section-description">
            This plugin uses Agent Zero&#39;s built-in <strong>Browser Model</strong> settings.<br/>
            Configure the browser LLM provider, model name, and parameters under
            <strong>Settings &#8594; Agent &#8594; Browser Model</strong>.
          </div>
          <div class="field">
            <div class="field-label">
              <div class="field-title">Status</div>
              <div class="field-description">
                Playwright CLI is active. The <code>browser_agent</code> tool is available to all agents.<br/>
                If Playwright CLI or Chromium are not yet installed, use the
                <strong>Initialize</strong> button (plugin list page) to install them automatically.
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</body>
</html>
